apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quarto-dev
  namespace: argocd
spec:
  project: quarto
  source:
    repoURL: https://github.com/mint-cocoa/libiouring-server.git
    targetRevision: feat/reverse-proxy
    path: examples/QuartoPlatform/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: quarto
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
