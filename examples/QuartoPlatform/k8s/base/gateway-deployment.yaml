apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: quarto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: gateway
      containers:
        - name: gateway
          image: quarto-gateway
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: jwt-secret
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: github-client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: github-client-secret
            - name: REDIS_URL
              value: redis://redis:6379
            - name: K8S_NAMESPACE
              value: quarto
            - name: EDITOR_IMAGE
              value: quarto-editor
            - name: FRONTEND_URL
              value: /
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: published
              mountPath: /srv/published
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: published
          persistentVolumeClaim:
            claimName: published-shared
